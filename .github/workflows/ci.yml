name: CI / CD — WebMiner Platform

on:
  push:
    branches: [main, develop]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY:    ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/webminer

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Lint & Type-check ───────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — API
        run: cd packages/api && npx tsc --noEmit

      - name: TypeScript — Worker
        run: cd packages/worker && npx tsc --noEmit

      - name: TypeScript — Dashboard
        run: cd dashboard && npx tsc --noEmit

  # ── 2. Integration Tests ───────────────────────────────────────────────────
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       webminer
          POSTGRES_USER:     webminer
          POSTGRES_PASSWORD: webminer_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['6379:6379']

    env:
      NODE_ENV:     test
      DATABASE_URL: postgresql://webminer:webminer_secret@localhost:5432/webminer
      REDIS_URL:    redis://localhost:6379
      JWT_SECRET:   test-secret-ci-only-not-for-production
      PORT:         3000
      MINIO_ENDPOINT:   localhost
      MINIO_PORT:       9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET:     webminer-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply DB schema
        run: |
          PGPASSWORD=webminer_secret psql -h localhost -U webminer -d webminer \
            -f infra/docker/postgres/init.sql

      - name: Build API
        run: cd packages/api && npm run build

      - name: Start API server
        run: |
          cd packages/api
          node dist/index.js &
          echo $! > /tmp/api.pid
          sleep 5

      - name: Wait for API health
        run: |
          for i in {1..20}; do
            curl -sf http://localhost:3000/health && break
            sleep 2
          done

      - name: Run API integration tests
        run: node scripts/test-api.js
        env:
          API_URL: http://localhost:3000

      - name: Stop API
        if: always()
        run: kill $(cat /tmp/api.pid) 2>/dev/null || true

  # ── 3. Build Docker Images ─────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, worker, scheduler, dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context:    packages/${{ matrix.service == 'dashboard' && '../dashboard' || matrix.service }}
          file:       packages/${{ matrix.service == 'dashboard' && '../dashboard' || matrix.service }}/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  # ── 4. Deploy to Staging ───────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/webminer
            git pull origin develop
            export TAG=sha-${{ github.sha }}
            bash scripts/deploy.sh --tag $TAG
            echo "Deployed $TAG to staging"

  # ── 5. Deploy to Production ────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/webminer
            export TAG=${{ github.ref_name }}
            export SCALE_WORKERS=5
            bash scripts/deploy.sh --tag $TAG
            echo "✅ Deployed $TAG to production"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            CHANGELOG.md
