---
# Prometheus ConfigMap — scrape WebMiner services
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: webminer
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: 'webminer-api'
        static_configs:
          - targets: ['webminer-api:3000']
        metrics_path: /metrics
        scrape_interval: 15s

      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-exporter:9187']

      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter:9121']

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [webminer]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

  rules.yml: |
    groups:
      - name: webminer
        rules:
          - alert: HighRunFailureRate
            expr: |
              rate(webminer_runs_failed[5m]) /
              (rate(webminer_runs_succeeded[5m]) + rate(webminer_runs_failed[5m])) > 0.3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High run failure rate (>30%)"
              description: "More than 30% of runs are failing over the last 5 minutes"

          - alert: RunQueueBacklog
            expr: webminer_queue_run_waiting > 50
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Large run queue backlog"
              description: "More than 50 runs waiting in queue. Consider scaling workers."

          - alert: APIDown
            expr: up{job="webminer-api"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "WebMiner API is down"

          - alert: HighAPIMemory
            expr: webminer_api_memory_heap_used_bytes > 400000000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "API heap usage > 400MB"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: webminer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.49.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=15d'
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: webminer
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
# RBAC for Prometheus pod discovery
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: webminer

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, pods, services, endpoints]
    verbs: [get, list, watch]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: webminer

---
# Grafana deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: webminer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: webminer-secrets
                  key: GRAFANA_PASSWORD
                  optional: true
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_INSTALL_PLUGINS
              value: "grafana-piechart-panel"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
      volumes:
        - name: storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: webminer
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
