apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: webminer

resources:
  - namespace.yaml
  - api.yaml
  - worker.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: webminer
  app.kubernetes.io/managed-by: kustomize

images:
  - name: webminer/api
    newTag: latest
  - name: webminer/worker
    newTag: latest
  - name: webminer/scheduler
    newTag: latest
  - name: webminer/dashboard
    newTag: latest
