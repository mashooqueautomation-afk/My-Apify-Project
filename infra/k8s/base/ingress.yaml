---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webminer-dashboard
  namespace: webminer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webminer-dashboard
  template:
    metadata:
      labels:
        app: webminer-dashboard
    spec:
      containers:
        - name: dashboard
          image: webminer/dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: webminer-dashboard
  namespace: webminer
spec:
  selector:
    app: webminer-dashboard
  ports:
    - port: 80
      targetPort: 80

---
# Ingress with cert-manager TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webminer-ingress
  namespace: webminer
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"     # SSE log streams
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"         # Required for SSE
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://webminer.io"
spec:
  tls:
    - hosts:
        - webminer.io
        - api.webminer.io
      secretName: webminer-tls
  rules:
    - host: api.webminer.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webminer-api
                port:
                  number: 3000
    - host: webminer.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: webminer-api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webminer-dashboard
                port:
                  number: 80

---
# PodDisruptionBudget — ensure availability during rolling updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: webminer-api-pdb
  namespace: webminer
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: webminer-api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: webminer-worker-pdb
  namespace: webminer
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: webminer-worker
