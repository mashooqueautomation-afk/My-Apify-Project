version: '3.9'

services:
  # ─── Infrastructure ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mash_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: webminer
      POSTGRES_USER: webminer
      POSTGRES_PASSWORD: webminer_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webminer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mash_redis
    restart: unless-stopped
    command: redis-server --requirepass webminer_redis --maxmemory 512mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "webminer_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mash_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: webminer
      MINIO_ROOT_PASSWORD: webminer_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: mash_lead_scrapping_network
